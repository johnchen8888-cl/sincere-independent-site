<line x1="505" y1="180" x2="505" y2="740" class="light"/>
<text x="100" y="770" class="small">Plan indicates bed position, side tables, wardrobe and circulation space.</text>
<line x1="95" y1="150" x2="745" y2="150" class="light"/><line x1="95" y1="150" x2="95" y2="170" class="light"/><line x1="745" y1="150" x2="745" y2="170" class="light"/>
<text x="392" y="143" class="dim">5400 mm</text>
