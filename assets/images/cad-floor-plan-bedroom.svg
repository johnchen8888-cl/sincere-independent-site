<rect x="820" y="180" width="560" height="270" class="filll"/>
<line x1="860" y1="195" x2="860" y2="435" class="line2"/><line x1="930" y1="195" x2="930" y2="435" class="line2"/><line x1="1000" y1="195" x2="1000" y2="435" class="line2"/><line x1="1070" y1="195" x2="1070" y2="435" class="line2"/><line x1="1140" y1="195" x2="1140" y2="435" class="line2"/><line x1="1210" y1="195" x2="1210" y2="435" class="line2"/><line x1="1280" y1="195" x2="1280" y2="435" class="line2"/>
<line x1="820" y1="340" x2="1380" y2="340" class="line2"/>
