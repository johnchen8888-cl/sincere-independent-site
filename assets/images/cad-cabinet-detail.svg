<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <rect width="100%" height="100%" fill="#ffffff"/>
  <style>
    .title{font:700 34px Inter, Arial, sans-serif; fill:#123b74;}
    .sub{font:700 18px Inter, Arial, sans-serif; fill:#6b7280; letter-spacing:0.04em;}
    .label{font:700 20px Inter, Arial, sans-serif; fill:#111827;}
    .small{font:500 16px Inter, Arial, sans-serif; fill:#4b5563;}
    .dim{font:600 14px Inter, Arial, sans-serif; fill:#6b7280;}
    .line{stroke:#1f2937; stroke-width:3; fill:none;}
    .line2{stroke:#374151; stroke-width:2; fill:none;}
    .light{stroke:#94a3b8; stroke-width:1.6; fill:none;}
    .guide{stroke:#e5e7eb; stroke-width:1; fill:none;}
    .filll{fill:#ffffff; stroke:#1f2937; stroke-width:2.2;}
    .accent{fill:#f8fafc; stroke:#d1d5db; stroke-width:1.5;}
  </style>
  
<text x="50" y="70" class="title">Joinery Detail / Cabinet Section</text>
<text x="70" y="125" class="sub">SECTION B-B</text>
<rect x="90" y="160" width="230" height="450" class="filll"/>
<rect x="125" y="195" width="160" height="90" class="accent"/>
<rect x="125" y="315" width="160" height="90" class="accent"/>
<rect x="125" y="435" width="160" height="140" class="accent"/>
<line x1="355" y1="160" x2="355" y2="610" class="light"/>
<line x1="335" y1="160" x2="355" y2="160" class="light"/>
<line x1="335" y1="610" x2="355" y2="610" class="light"/>
<text x="373" y="390" transform="rotate(90 373,390)" class="dim">720 mm</text>
<text x="430" y="125" class="sub">EXPLODED PANEL DETAIL</text>
<polygon points="520,230 760,180 860,215 620,265" class="filll"/>
<polygon points="540,320 780,270 880,305 640,355" class="filll"/>
<polygon points="560,410 800,360 900,395 660,445" class="filll"/>
<polygon points="580,500 820,450 920,485 680,535" class="filll"/>
<text x="720" y="170" class="small">Top Finish Layer</text>
<text x="740" y="260" class="small">Decor Layer</text>
<text x="760" y="350" class="small">Core Board</text>
<text x="780" y="440" class="small">Backing Layer</text>
<text x="430" y="610" class="label">Technical Drawing</text>
<text x="430" y="645" class="small">Sections, exploded details and dimensions support more accurate project quotation.</text>

</svg>