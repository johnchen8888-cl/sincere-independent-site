<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <rect width="100%" height="100%" fill="#ffffff"/>
  <style>
    .title{font:700 34px Inter, Arial, sans-serif; fill:#123b74;}
    .sub{font:700 18px Inter, Arial, sans-serif; fill:#6b7280; letter-spacing:0.04em;}
    .label{font:700 20px Inter, Arial, sans-serif; fill:#111827;}
    .small{font:500 16px Inter, Arial, sans-serif; fill:#4b5563;}
    .dim{font:600 14px Inter, Arial, sans-serif; fill:#6b7280;}
    .line{stroke:#1f2937; stroke-width:3; fill:none;}
    .line2{stroke:#374151; stroke-width:2; fill:none;}
    .light{stroke:#94a3b8; stroke-width:1.6; fill:none;}
    .guide{stroke:#e5e7eb; stroke-width:1; fill:none;}
    .filll{fill:#ffffff; stroke:#1f2937; stroke-width:2.2;}
    .accent{fill:#f8fafc; stroke:#d1d5db; stroke-width:1.5;}
  </style>
  
<text x="70" y="80" class="title">Kitchen Cabinet CAD Drawing</text>
<!-- elevation -->
<text x="130" y="150" class="sub">ELEVATION A</text>
<rect x="120" y="180" width="860" height="260" class="filll"/>
<line x1="120" y1="360" x2="980" y2="360" class="line2"/>
<line x1="240" y1="180" x2="240" y2="440" class="line2"/>
<line x1="420" y1="180" x2="420" y2="440" class="line2"/>
<line x1="580" y1="180" x2="580" y2="440" class="line2"/>
<line x1="760" y1="180" x2="760" y2="440" class="line2"/>
<line x1="890" y1="180" x2="890" y2="440" class="line2"/>
<rect x="500" y="285" width="165" height="115" class="line"/>
<rect x="710" y="285" width="90" height="115" class="line"/>
<line x1="500" y1="400" x2="665" y2="400" class="line2"/>
<line x1="710" y1="400" x2="800" y2="400" class="line2"/>
<text x="505" y="270" class="small">Sink Base</text>
<text x="705" y="270" class="small">Cooktop</text>
<line x1="120" y1="145" x2="980" y2="145" class="light"/>
<line x1="120" y1="145" x2="120" y2="165" class="light"/>
<line x1="980" y1="145" x2="980" y2="165" class="light"/>
<text x="510" y="137" class="dim">3000 mm</text>
<line x1="92" y1="180" x2="92" y2="440" class="light"/>
<line x1="92" y1="180" x2="112" y2="180" class="light"/>
<line x1="92" y1="440" x2="112" y2="440" class="light"/>
