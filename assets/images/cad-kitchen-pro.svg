<line x1="1270" y1="370" x2="1480" y2="370" class="line2"/>
<circle cx="1215" cy="462" r="28" class="line2"/>
<line x1="1215" y1="434" x2="1215" y2="390" class="line2"/>
<circle cx="1260" cy="472" r="28" class="line2"/>
<line x1="1260" y1="444" x2="1260" y2="400" class="line2"/>
<text x="1160" y="770" class="label">Drawing & Specification Support</text>
<text x="1160" y="805" class="small">Professional CAD drawings help confirm size, layout, cabinet structure and quotation.</text>

</svg>