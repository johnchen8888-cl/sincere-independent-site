<!-- plan -->
<text x="130" y="520" class="sub">PLAN / TOP VIEW</text>
<rect x="140" y="560" width="690" height="170" class="filll"/>
<line x1="140" y1="645" x2="830" y2="645" class="line2"/>
<line x1="300" y1="560" x2="300" y2="730" class="line2"/>
<line x1="620" y1="560" x2="620" y2="730" class="line2"/>
