<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <rect width="100%" height="100%" fill="#ffffff"/>
  <style>
    .title{font:700 34px Inter, Arial, sans-serif; fill:#123b74;}
    .sub{font:700 18px Inter, Arial, sans-serif; fill:#6b7280; letter-spacing:0.04em;}
    .label{font:700 20px Inter, Arial, sans-serif; fill:#111827;}
    .small{font:500 16px Inter, Arial, sans-serif; fill:#4b5563;}
    .dim{font:600 14px Inter, Arial, sans-serif; fill:#6b7280;}
    .line{stroke:#1f2937; stroke-width:3; fill:none;}
    .line2{stroke:#374151; stroke-width:2; fill:none;}
    .light{stroke:#94a3b8; stroke-width:1.6; fill:none;}
    .guide{stroke:#e5e7eb; stroke-width:1; fill:none;}
    .filll{fill:#ffffff; stroke:#1f2937; stroke-width:2.2;}
    .accent{fill:#f8fafc; stroke:#d1d5db; stroke-width:1.5;}
  </style>
  
<text x="60" y="80" class="title">Bathroom Vanity CAD Drawing</text>
<text x="80" y="145" class="sub">FRONT ELEVATION</text>
<rect x="90" y="185" width="420" height="420" class="filll"/>
<ellipse cx="300" cy="270" rx="110" ry="110" class="line2"/>
<rect x="175" y="360" width="250" height="170" class="line2"/>
<line x1="300" y1="360" x2="300" y2="530" class="line2"/>
<circle cx="300" cy="445" r="12" class="line2"/>
<text x="560" y="145" class="sub">SIDE VIEW</text>
<rect x="590" y="225" width="170" height="330" class="filll"/>
<line x1="590" y1="280" x2="760" y2="280" class="line2"/>
<line x1="670" y1="225" x2="670" y2="555" class="line2"/>
<text x="820" y="145" class="sub">TOP VIEW</text>
<rect x="850" y="240" width="340" height="230" rx="4" class="filll"/>
<rect x="980" y="285" width="80" height="55" rx="24" class="line2"/>
<circle cx="1020" cy="380" r="12" class="line2"/>
<line x1="890" y1="500" x2="1145" y2="500" class="light"/><line x1="890" y1="500" x2="890" y2="480" class="light"/><line x1="1145" y1="500" x2="1145" y2="480" class="light"/>
<text x="975" y="523" class="dim">1200 mm</text>
<text x="80" y="680" class="label">Drawing & Specification Support</text>
<text x="80" y="715" class="small">Elevation, side and countertop layout help confirm vanity size, sink placement and installation requirements.</text>

</svg>