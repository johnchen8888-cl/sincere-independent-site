    .label{font:700 19px Inter, Arial, sans-serif; fill:#111827;}
    .small{font:500 15px Inter, Arial, sans-serif; fill:#4b5563;}
    .dim{font:600 14px Inter, Arial, sans-serif; fill:#6b7280;}
    .line{stroke:#1f2937; stroke-width:2.6; fill:none;}
    .line2{stroke:#374151; stroke-width:1.8; fill:none;}
    .light{stroke:#94a3b8; stroke-width:1.2; fill:none;}
    .filll{fill:#ffffff; stroke:#1f2937; stroke-width:1.8;}
