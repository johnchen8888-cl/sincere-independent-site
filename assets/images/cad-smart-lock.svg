<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="920" viewBox="0 0 1400 920">
  <rect width="100%" height="100%" fill="#ffffff"/>
  <style>
    .title{font:700 34px Inter, Arial, sans-serif; fill:#123b74;}
    .sub{font:700 17px Inter, Arial, sans-serif; fill:#6b7280; letter-spacing:0.04em;}
    .label{font:700 19px Inter, Arial, sans-serif; fill:#111827;}
    .small{font:500 15px Inter, Arial, sans-serif; fill:#4b5563;}
    .dim{font:600 14px Inter, Arial, sans-serif; fill:#6b7280;}
    .line{stroke:#1f2937; stroke-width:2.6; fill:none;}
    .line2{stroke:#374151; stroke-width:1.8; fill:none;}
    .light{stroke:#94a3b8; stroke-width:1.2; fill:none;}
    .filll{fill:#ffffff; stroke:#1f2937; stroke-width:1.8;}
    .gray{fill:#f8fafc; stroke:#cbd5e1; stroke-width:1.2;}
  </style>
  
<text x="60" y="80" class="title">Smart Lock & Door Hardware Detail</text>
<text x="80" y="140" class="sub">FRONT ELEVATION</text>
<rect x="90" y="180" width="260" height="630" class="filll"/>
<rect x="210" y="275" width="110" height="220" rx="12" class="line2"/>
<rect x="228" y="305" width="74" height="95" rx="8" class="line2"/>
<circle cx="245" cy="430" r="4" class="line2"/><circle cx="265" cy="430" r="4" class="line2"/><circle cx="285" cy="430" r="4" class="line2"/><circle cx="245" cy="448" r="4" class="line2"/><circle cx="265" cy="448" r="4" class="line2"/><circle cx="285" cy="448" r="4" class="line2"/><circle cx="245" cy="466" r="4" class="line2"/><circle cx="265" cy="466" r="4" class="line2"/><circle cx="285" cy="466" r="4" class="line2"/>
<rect x="214" y="525" width="102" height="26" rx="10" class="line2"/>
<circle cx="265" cy="636" r="46" class="line2"/>
<line x1="60" y1="180" x2="60" y2="810" class="light"/><line x1="60" y1="180" x2="80" y2="180" class="light"/><line x1="60" y1="810" x2="80" y2="810" class="light"/>
<text x="45" y="510" transform="rotate(-90 45,510)" class="dim">2400 mm door reference</text>
<text x="450" y="140" class="sub">LOCKSET SIDE / BACKSET DETAIL</text>
<rect x="480" y="210" width="320" height="170" class="filll"/>
<rect x="520" y="260" width="220" height="60" class="line2"/>
<rect x="720" y="245" width="35" height="90" class="line2"/>
<text x="560" y="410" class="small">60 / 70 mm adjustable backset</text>
<text x="450" y="495" class="sub">COMPONENT / WIRING REFERENCE</text>
<rect x="480" y="540" width="320" height="200" class="filll"/>
<circle cx="560" cy="640" r="28" class="line2"/>
<rect x="635" y="610" width="95" height="65" rx="8" class="line2"/>
<line x1="588" y1="640" x2="634" y2="642" class="light"/>
<text x="840" y="220" class="sub">INSTALLATION NOTES</text>
<text x="840" y="270" class="small">• Door thickness: 38–60 mm</text>
<text x="840" y="305" class="small">• Center line aligned with handle</text>
<text x="840" y="340" class="small">• Suitable for wood / steel doors</text>
<text x="840" y="375" class="small">• Optional gateway / app control</text>
<text x="840" y="450" class="label">Technical Drawing Support</text>
<text x="840" y="485" class="small">Professional lockset dimensions and hardware details help verify compatibility before quotation and production.</text>

</svg>