<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <rect width="100%" height="100%" fill="#ffffff"/>
  <style>
    .title{font:700 34px Inter, Arial, sans-serif; fill:#123b74;}
    .sub{font:700 18px Inter, Arial, sans-serif; fill:#6b7280; letter-spacing:0.04em;}
    .label{font:700 20px Inter, Arial, sans-serif; fill:#111827;}
    .small{font:500 16px Inter, Arial, sans-serif; fill:#4b5563;}
    .dim{font:600 14px Inter, Arial, sans-serif; fill:#6b7280;}
    .line{stroke:#1f2937; stroke-width:3; fill:none;}
    .line2{stroke:#374151; stroke-width:2; fill:none;}
    .light{stroke:#94a3b8; stroke-width:1.6; fill:none;}
    .guide{stroke:#e5e7eb; stroke-width:1; fill:none;}
    .filll{fill:#ffffff; stroke:#1f2937; stroke-width:2.2;}
    .accent{fill:#f8fafc; stroke:#d1d5db; stroke-width:1.5;}
  </style>
  
<text x="60" y="80" class="title">Interior Door CAD Drawing</text>
<text x="90" y="140" class="sub">ELEVATION</text>
<rect x="90" y="180" width="280" height="600" class="filll"/>
<rect x="135" y="225" width="190" height="510" class="line2"/>
<line x1="135" y1="345" x2="325" y2="345" class="line2"/>
<line x1="135" y1="515" x2="325" y2="515" class="line2"/>
<circle cx="300" cy="480" r="10" class="line2"/>
<line x1="65" y1="180" x2="65" y2="780" class="light"/><line x1="65" y1="180" x2="85" y2="180" class="light"/><line x1="65" y1="780" x2="85" y2="780" class="light"/>
<text x="49" y="500" transform="rotate(-90 49,500)" class="dim">2100 mm</text>
<line x1="90" y1="145" x2="370" y2="145" class="light"/><line x1="90" y1="145" x2="90" y2="165" class="light"/><line x1="370" y1="145" x2="370" y2="165" class="light"/>
<text x="195" y="136" class="dim">900 mm</text>
<text x="470" y="140" class="sub">FRAME SECTION</text>
<rect x="500" y="190" width="190" height="180" class="filll"/>
<rect x="545" y="230" width="100" height="100" class="line2"/>
<path d="M545 230 h-25 v100 h25" class="line2"/>
<text x="740" y="250" class="small">45 mm leaf</text>
<text x="740" y="280" class="small">90 mm frame</text>
<text x="740" y="310" class="small">Seal groove detail</text>
<text x="470" y="430" class="sub">HARDWARE POSITION</text>
<rect x="500" y="470" width="190" height="250" class="filll"/>
<line x1="595" y1="490" x2="595" y2="705" class="line2"/>
<circle cx="610" cy="600" r="10" class="line2"/>
<rect x="560" y="570" width="35" height="60" class="line2"/>
<text x="735" y="560" class="small">Lockset center: 1050 mm</text>
<text x="735" y="600" class="small">Hinge qty: 3 pcs</text>
<text x="735" y="640" class="small">Optional closer / seal</text>

</svg>