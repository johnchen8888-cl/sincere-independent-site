<text x="810" y="565" class="sub">RCP / CEILING</text>
<rect x="820" y="610" width="560" height="185" class="filll"/>
<rect x="860" y="640" width="480" height="125" rx="12" class="line2"/>
<line x1="860" y1="700" x2="1340" y2="700" class="light"/>
<line x1="1100" y1="640" x2="1100" y2="765" class="light"/>
<circle cx="940" cy="675" r="12" class="line2"/><circle cx="1260" cy="675" r="12" class="line2"/>
<text x="960" y="835" class="label">CAD Drawing Support</text>
<text x="960" y="868" class="small">Plan, wall elevation and ceiling layout help visualize the overall living room design package.</text>

