<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="1000" viewBox="0 0 1500 1000">
  <rect width="100%" height="100%" fill="#ffffff"/>
  <style>
    .title{font:700 34px Inter, Arial, sans-serif; fill:#123b74;}
    .sub{font:700 17px Inter, Arial, sans-serif; fill:#6b7280; letter-spacing:0.04em;}
    .label{font:700 19px Inter, Arial, sans-serif; fill:#111827;}
    .small{font:500 15px Inter, Arial, sans-serif; fill:#4b5563;}
    .dim{font:600 14px Inter, Arial, sans-serif; fill:#6b7280;}
    .line{stroke:#1f2937; stroke-width:2.6; fill:none;}
    .line2{stroke:#374151; stroke-width:1.8; fill:none;}
    .light{stroke:#94a3b8; stroke-width:1.2; fill:none;}
    .filll{fill:#ffffff; stroke:#1f2937; stroke-width:1.8;}
    .gray{fill:#f8fafc; stroke:#cbd5e1; stroke-width:1.2;}
  </style>
  
<text x="70" y="85" class="title">Living Room Layout Plan</text>
<text x="70" y="135" class="sub">FURNITURE ARRANGEMENT / CEILING / TV WALL ELEVATION</text>
<rect x="95" y="180" width="640" height="560" class="filll"/>
<rect x="140" y="230" width="210" height="110" class="gray"/>
<rect x="395" y="250" width="180" height="85" rx="10" class="gray"/>
<rect x="405" y="495" width="170" height="48" rx="12" class="gray"/>
<rect x="225" y="490" width="125" height="140" class="gray"/>
<circle cx="485" cy="575" r="70" class="line2"/>
<rect x="610" y="250" width="70" height="280" class="gray"/>
<rect x="140" y="390" width="115" height="210" class="gray"/>
<line x1="95" y1="460" x2="735" y2="460" class="light"/>
<line x1="325" y1="180" x2="325" y2="740" class="light"/>
<text x="100" y="770" class="small">Plan indicates sofa layout, circulation and TV wall location.</text>
<line x1="95" y1="150" x2="735" y2="150" class="light"/><line x1="95" y1="150" x2="95" y2="170" class="light"/><line x1="735" y1="150" x2="735" y2="170" class="light"/>
<text x="370" y="143" class="dim">6200 mm</text>
<text x="810" y="135" class="sub">TV WALL ELEVATION</text>
<rect x="820" y="180" width="560" height="290" class="filll"/>
<line x1="860" y1="195" x2="860" y2="455" class="line2"/><line x1="910" y1="195" x2="910" y2="455" class="line2"/><line x1="960" y1="195" x2="960" y2="455" class="line2"/><line x1="1010" y1="195" x2="1010" y2="455" class="line2"/><line x1="1060" y1="195" x2="1060" y2="455" class="line2"/><line x1="1110" y1="195" x2="1110" y2="455" class="line2"/><line x1="1160" y1="195" x2="1160" y2="455" class="line2"/><line x1="1210" y1="195" x2="1210" y2="455" class="line2"/><line x1="1260" y1="195" x2="1260" y2="455" class="line2"/><line x1="1310" y1="195" x2="1310" y2="455" class="line2"/>
<rect x="1020" y="250" width="170" height="95" class="line"/>
<line x1="820" y1="365" x2="1380" y2="365" class="line2"/>
